<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Game Experiments</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="home-body">
    <div id="game-container">
        <h1 class="main-title">Web Game Experiments</h1>
        <p class="subtitle">Welcome to the collection of my web-based game experiments.</p>
        
        <div class="game-grid">
            {% for game in games %}
            <div class="game-card">
                <h2>{{ game.title }}</h2>
                <p>{{ game.description }}</p>
                <a href="{{ game.url }}" class="play-button">Play Game</a>
            </div>
            {% endfor %}
        </div>

        <div id="status">Status: Ready to Play</div>
    </div>
</body>
</html>
